</head>

</main>

const SUGGESTIONS_LIST = ['당근','감자','고구마','닭가슴살','소고기','브로콜리','애호박','두부','달걀','쌀','시금치','양파','사과','배','바나나'];
let tags = [];

const input = document.getElementById('ingredient-input');
const tagWrap = document.getElementById('tag-wrap');

// 자주 쓰는 재료 칩
const sugWrap = document.getElementById('suggestions');
SUGGESTIONS_LIST.forEach(s => {
  const chip = document.createElement('button');
  chip.className = 'suggestion-chip';
  chip.textContent = s;
  chip.onclick = () => addTag(s);
  sugWrap.appendChild(chip);
});

input.addEventListener('keydown', e => {
  if (e.isComposing) return;
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = input.value.replace(/,/g, '').trim();
    if (val) addTag(val);
    input.value = '';
  } else if (e.key === 'Backspace' && input.value === '' && tags.length > 0) {
    removeTag(tags.length - 1);
  }
});
input.addEventListener('input', () => {
  if (input.value.includes(',')) {
    input.value.split(',').map(s => s.trim()).filter(Boolean).forEach(p => addTag(p));
    input.value = '';
  }
});

function addTag(val) {
  val = val.trim();
  if (!val || tags.includes(val)) return;
  tags.push(val);
  renderTags();
}
function removeTag(idx) {
  tags.splice(idx, 1);
  renderTags();
}
function renderTags() {
  tagWrap.querySelectorAll('.tag').forEach(el => el.remove());
  tags.forEach((t, i) => {
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.innerHTML = `${t}<button onclick="removeTag(${i})">×</button>`;
    tagWrap.insertBefore(tag, input);
  });
}

function showBanner(msg, type = '') {
  const b = document.getElementById('status-banner');
  document.getElementById('status-text').textContent = msg;
  b.className = 'status-banner show ' + type;
}
function hideBanner() {
  document.getElementById('status-banner').className = 'status-banner';
}

function searchRecipes() {
  if (tags.length === 0) {
    showBanner('재료를 먼저 입력해 주세요!', 'error');
    return;
  }
  hideBanner();

  const selectedAge = document.getElementById('baby-age').value;
  const normalizedTags = tags.map(t => t.toLowerCase().trim());

  // 재료 매칭 점수 계산
  let results = RECIPES.map(recipe => {
    const recipeIngredients = recipe.ingredients.map(i => i.toLowerCase());
    const matchCount = normalizedTags.filter(tag =>
      recipeIngredients.some(ri => ri.includes(tag) || tag.includes(ri))
    ).length;
    return { ...recipe, matchCount };
  })
  .filter(r => r.matchCount > 0)
  .sort((a, b) => b.matchCount - a.matchCount);

  // 월령 필터
  if (selectedAge !== 'all') {
    const ageNum = parseInt(selectedAge);
    results = results.filter(r => {
      const rAge = parseInt(r.age);
      return isNaN(rAge) || rAge <= ageNum;
    });
  }

  const container = document.getElementById('recipes-container');
  container.innerHTML = '';

  if (results.length === 0) {
    container.innerHTML = `<div class="no-result">😢 입력한 재료로 찾을 수 있는 레시피가 없어요.<br>다른 재료를 추가해보세요!</div>`;
  } else {
    const colors = ['#e8f8f5','#fff9e6','#fff0ee','#f0eeff'];
    results.forEach((r, idx) => {
      const card = document.createElement('div');
      card.className = 'recipe-card';
      card.innerHTML = `
        ${r.image ? `<img class="card-img" src="${r.image}" alt="${r.name}" loading="lazy" onerror="this.style.display='none'">` : ''}
        <div class="card-header">
          <div class="card-icon" style="background:${colors[idx % colors.length]}">${r.name.match(/[\u{1F300}-\u{1FFFF}]|[\u{2600}-\u{26FF}]/u)?.[0] || '🍽️'}</div>
          <div class="card-title-wrap">
            <div class="card-title">${r.name.replace(/^[\u{1F300}-\u{1FFFF}\u{2600}-\u{26FF}]\s*/u, '')}</div>
            <div class="card-meta">
              <span class="badge badge-age">👶 ${r.age}</span>
              <span class="badge badge-match">🥕 재료 ${r.matchCount}개 매칭</span>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="recipe-section">
            <div class="recipe-section-title">재료</div>
            <div class="recipe-section-content">${r.ingredients.join(', ')}</div>
          </div>
          <div class="recipe-section">
            <div class="recipe-section-title">조리법</div>
            <div class="recipe-section-content">${r.steps}</div>
          </div>
          ${r.nutrition ? `<div class="recipe-section">
            <div class="recipe-section-title">영양 포인트</div>
            <div class="recipe-section-content">${r.nutrition}</div>
          </div>` : ''}
          ${r.warning ? `<div class="recipe-section">
            <div class="warning-box">⚠️ ${r.warning}</div>
          </div>` : ''}
        </div>`;
      container.appendChild(card);
    });
  }

  document.getElementById('result-title').textContent = `🍽️ 추천 레시피 (${tags.join(', ')})`;
  document.getElementById('result-area').classList.add('show');
}

function clearResults() {
  document.getElementById('result-area').classList.remove('show');
  document.getElementById('recipes-container').innerHTML = '';
  hideBanner();
  tags = [];
  renderTags();
}
</script>
